name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Convert repository owner to lowercase for registry compliance
    - name: Downcase Repository Name
      id: repo_info
      run: |
        echo "owner_lc=${OWNER,,}" >> ${GITHUB_OUTPUT}
        echo "repo_lc=${REPO,,}" >> ${GITHUB_OUTPUT}
      env:
        OWNER: "${{ github.repository_owner }}"
        REPO: "${{ github.event.repository.name }}"

    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: true
        tags: |
          ghcr.io/${{ steps.repo_info.outputs.owner_lc }}/${{ steps.repo_info.outputs.repo_lc }}:latest
